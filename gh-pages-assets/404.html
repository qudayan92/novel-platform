<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var segment = window.location.pathname.split('/').filter(function(s) { return s; });
    var hash = window.location.hash;
    window.location.href = '/novel-platform/' + (segment.length ? segment.join('/') : '') + (hash ? hash : '') + (window.location.search ? window.location.search : '');
  </script>
</head>
<body>
  <p>Redirecting to <a href="/novel-platform/">home</a>...</p>
</body>
</html>
